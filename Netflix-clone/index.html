<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Netflix-Clone</title>
        <link
            href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
            rel="stylesheet" />
        <link rel="stylesheet" href="./style.css">
    </head>

    <body>
        <header>
            <img src="./images/netflix-logo.png" alt="Logo">
            <div>
                <select id="language">
                    <option value="English">English</option>
                    <option value="Hindi">Hindi</option>
                </select>
                <a href="#">Sign In</a>
            </div>
        </header>

        <section class="hero">
            <div class="master">
                <div class="content">
                    <h1>Unlimited movies, <br> shows, and more</h1>
                    <h4>Starts at ₹149. Cancel at any time.</h4>
                    <p>Ready to watch? Enter your email to create or restart your membership.</p>
                    <div>
                        <input type="text" placeholder="Email address">
                        <button>Get Started &nbsp; ></button>
                    </div>
                </div>
            </div>
        </section>

        <section class="trending">
            <h2>Trending Now</h2>
            <div class="images">
                <div class="image">
                    <img src="./images/Dhurendhar.png" alt="image-1">
                    <h1>1</h1>
                </div>
                <div class="image">
                    <img src="./images/one-piece.png" alt="image-2">
                    <h1>2</h1>
                </div>
                <div class="image">
                    <img src="./images/kapil-show.png" alt="image-3">
                    <h1>3</h1>
                </div>
                <div class="image">
                    <img src="./images/made-in-korea.png" alt="image-4">
                    <h1>4</h1>
                </div>
                <div class="image">
                    <img src="./images/with-love.png" alt="image-5">
                    <h1>5</h1>
                </div>
            </div>
        </section>
    </body>

</html>
